server {
    listen 8081;
    server_name _;

    # Archivos estáticos del MF (tienen prioridad absoluta por usar '=')
    location = /mf-appointments.js {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin *;
    }

    location = /mf-appointments.css {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin *;
    }

    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }

    # 🔥 Proxy por defecto para TODAS las demás rutas (Bukeala)
    # Cualquier redirección o ruta absoluta de Bukeala caerá acá automáticamente
    location / {
        resolver 8.8.8.8 valid=30s ipv6=off;
        set $bukeala_upstream "https://precolsanitas.bukeala.com";
        proxy_pass $bukeala_upstream;

        proxy_set_header Host precolsanitas.bukeala.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 🔥 SNI (Server Name Indication)
        # CRÍTICO: Si Bukeala está detrás de un Load Balancer (AWS, Cloudflare, etc)
        # necesita que le digamos el nombre del dominio en el Handshake SSL, de lo contrario da 404.
        proxy_ssl_server_name on;
        proxy_ssl_name precolsanitas.bukeala.com;

        proxy_cookie_domain precolsanitas.bukeala.com localhost;
        
        # Reescribimos redirecciones para mantenernos en el puerto 8081
        proxy_redirect https://precolsanitas.bukeala.com/ /;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}